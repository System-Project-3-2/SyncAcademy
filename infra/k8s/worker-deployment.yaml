apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-worker
  template:
    metadata:
      labels:
        app: lms-worker
    spec:
      containers:
        - name: worker
          image: your-registry/lms-worker:latest
          command: ["node", "workers/index.js"]
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: lms-secrets
                  key: redis_url
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: lms-secrets
                  key: mongo_uri
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lms-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lms-worker
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
